[workspace]
resolver = "2"
members = [
    "crates/exspeed",
    "crates/exspeed-common",
    "crates/exspeed-protocol",
]

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }

# Byte buffers (zero-copy, reference-counted)
bytes = "1"

# Serialization
serde = { version = "1", features = ["derive"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Async stream utilities
futures-util = "0.3"

[profile.dev]
opt-level = 1
