# Development / integration testing services
# Usage: docker-compose up -d
services:
  exspeed:
    build: .
    ports:
      - "5933:5933"
      - "8080:8080"
    volumes:
      - exspeed-data:/var/lib/exspeed
    environment:
      RUST_LOG: info
    depends_on:
      - postgres
      - rabbitmq
      - minio

  postgres:
    image: postgres:16
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=4
        -c max_wal_senders=4
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  mysql:
    image: mysql:8.0
    container_name: exspeed-mysql
    environment:
      MYSQL_ROOT_PASSWORD: exspeed
      MYSQL_DATABASE: exspeed
      MYSQL_USER: exspeed
      MYSQL_PASSWORD: exspeed
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uexspeed", "-pexspeed"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: ["--default-authentication-plugin=mysql_native_password"]

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: exspeed-mssql
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Exspeed_Test!1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Exspeed_Test!1' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  exspeed-data:
